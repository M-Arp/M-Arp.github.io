<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NFL Mock Draft Builder</title>
<style>
/* Your existing styles... (omitted here for brevity, keep your styles as-is) */
body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: space-around;
    margin: 15px;
}
/* ... rest of your styles ... */
</style>
</head>
<body>

<div class="column">
    <h2>Player Pool</h2>
    <div class="filter-buttons">
        <button class="filter-button" onclick="toggleFilter('QB')">QB</button>
        <button class="filter-button" onclick="toggleFilter('RB')">RB</button>
        <button class="filter-button" onclick="toggleFilter('TE')">TE</button>
        <button class="filter-button" onclick="toggleFilter('OT')">OT</button>
        <button class="filter-button" onclick="toggleFilter('IOL')">IOL</button>
        <button class="filter-button" onclick="toggleFilter('WR')">WR</button>
        <button class="filter-button" onclick="toggleFilter('CB')">CB</button>
        <button class="filter-button" onclick="toggleFilter('DT')">DT</button>
        <button class="filter-button" onclick="toggleFilter('EDGE')">EDGE</button>
        <button class="filter-button" onclick="toggleFilter('LB')">LB</button>
        <button class="filter-button" onclick="toggleFilter('S')">S</button>
        <button class="filter-button" onclick="toggleFilter('ST')">ST</button>
        <button class="filter-button" onclick="resetFilter()">All</button>
    </div>
    <div id="players"></div>
</div>

<div class="column">
    <h2>Draft Order</h2>
    <label for="numRounds">Number of Draft Picks:</label>
    <input type="number" id="numRounds" min="1" max="257" value="32" />
    <button id="updateRounds">Update</button>
    <div id="draftOrder"></div>
</div>

<div class="column">
    <h2>Draft Results</h2>
    <button id="undoPick" style="display: none;">Undo Last Pick</button>
    <div id="draftResults"></div>
</div>

<script>
// Your existing data URLs and variables...
const playersUrl = `https://docs.google.com/spreadsheets/d/1r5-UN66a-DGc9RWyvAdTu-4FIfDP11-9CXLFgftiuXA/gviz/tq?tqx=out:json`;
const teamsUrl = `https://docs.google.com/spreadsheets/d/1PjanMWKX99obCsdfLzDDsk2-CvqHzerHaJzlRnxigj0/gviz/tq?tqx=out:json`;

let players = [];
let teams = [];
let currentDraftPick = 0;
let numRounds = 32;
let currentPlayerOffset = 0;
const playersPerPage = 50;
let filteredPlayers = [];
let activeFilters = new Set();
let draftHistory = [];

// Fetch players data
fetch(playersUrl)
  .then(response => response.text())
  .then(data => {
    const jsonData = JSON.parse(data.substr(47).slice(0, -2));
    players = jsonData.table.rows.map(row => ({
      name: row.c[5]?.v,
      position: row.c[6]?.v,
      school: row.c[8]?.v,
      ranking: row.c[0]?.v
    }));
    filteredPlayers = [...players];
    sortPlayersByRanking();
    displayPlayers(filteredPlayers);
  });

// Fetch teams data
fetch(teamsUrl)
  .then(response => response.text())
  .then(data => {
    const jsonData = JSON.parse(data.substr(47).slice(0, -2));
    teams = jsonData.table.rows.map(row => ({
      name: row.c[2]?.v,
      logo: row.c[3]?.v,
      draftOrder: row.c[1]?.v,
      needs: row.c[5]?.v
    }));
    displayDraftOrder(teams);
  });

// Simplified display function
function displayPlayers(playersArray) {
    const container = document.getElementById('players');
    container.innerHTML = '';
    for (let i = 0; i < playersArray.length; i++) {
        const p = playersArray[i];
        const div = document.createElement('div');
        div.className = 'prospect';
        div.innerHTML = `<strong>${p.name}</strong> (${p.position}) - ${p.school}`;
        div.onclick = () => assignPlayerToDraft(p);
        container.appendChild(div);
    }
}

// Display draft order
function displayDraftOrder(teamsData) {
    const container = document.getElementById('draftOrder');
    container.innerHTML = '';
    const maxRounds = Math.min(numRounds, teamsData.length);
    for (let i = 0; i < maxRounds; i++) {
        const team = teamsData[i];
        const div = document.createElement('div');
        div.className = 'team';
        div.innerHTML = `
            <div class="draft-order-container">
                <span class="draft-order">${team.draftOrder}</span>
                <img src="${team.logo}" class="team-logo"/>
            </div>
            <div class="team-info">
                <div class="team-detail">
                    <span class="team-name">${team.name}</span>
                    <button class="edit-button">Edit</button>
                </div>
                <div class="team-needs">Needs: ${team.needs}</div>
            </div>
        `;
        // Add event for edit button if needed...
        container.appendChild(div);
    }
    highlightNextTeam();
}

// Highlight current draft pick
function highlightNextTeam() {
    const divs = document.querySelectorAll('.team');
    divs.forEach((d, i) => {
        d.style.fontWeight = (i === currentDraftPick) ? 'bold' : 'normal';
    });
}

// Sorting function
function sortPlayersByRanking() {
    players.sort((a, b) => parseInt(a.ranking) - parseInt(b.ranking));
}

// Assign player to draft
function assignPlayerToDraft(player) {
    if (currentDraftPick >= teams.length) return;
    const team = teams[currentDraftPick];

    // Add to draft results
    const draftDiv = document.createElement('div');
    draftDiv.className = 'draft-result';
    draftDiv.innerHTML = `
        <span class="draft-pick">${team.draftOrder}</span>
        <div>
            <span class="team-name">${team.name}</span><br>
            <span>${player.name} | <span class="player-position">${player.position} (#${player.ranking})</span></span>
        </div>
    `;
    document.getElementById('draftResults').insertBefore(draftDiv, document.getElementById('draftResults').firstChild);

    // Record draft for undo
    draftHistory.push({ player, team });

    // Remove player from pool
    players = players.filter(p => p.name !== player.name);
    filteredPlayers = filteredPlayers.filter(p => p.name !== player.name);
    displayPlayers(filteredPlayers);

    // Remove team from draft order
    teams.splice(currentDraftPick, 1);
    displayDraftOrder(teams);

    // Next team
    if (currentDraftPick >= teams.length) currentDraftPick = 0;
    highlightNextTeam();

    // Show undo button
    document.getElementById('undoPick').style.display = 'inline-block';
}

// Undo last pick
function undoLastPick() {
    if (draftHistory.length === 0) return;
    const last = draftHistory.pop();

    // Remove last draft result from UI
    const draftResultsDiv = document.getElementById('draftResults');
    if (draftResultsDiv.firstChild) {
        draftResultsDiv.removeChild(draftResultsDiv.firstChild);
    }

    // Add player back to pool
    players.push(last.player);
    // Reset filteredPlayers to full list
    filteredPlayers = [...players];
    // Reset offset
    currentPlayerOffset = 0;
    // Sort again
    sortPlayersByRanking();
    // Display all
    displayPlayers(filteredPlayers);

    // Add team back to draft order
    teams.unshift(last.team);
    displayDraftOrder(teams);

    if (draftHistory.length === 0) {
        document.getElementById('undoPick').style.display = 'none';
    }
}

// Reset filters to show all
function resetFilter() {
    activeFilters.clear();
    currentPlayerOffset = 0;
    filteredPlayers = [...players];
    displayPlayers(filteredPlayers);
}

// Hook up undo button
document.getElementById('undoPick').addEventListener('click', undoLastPick);

// Optional: update rounds
document.getElementById('updateRounds').addEventListener('click', () => {
    const val = Number(document.getElementById('numRounds').value);
    numRounds = Math.max(1, Math.min(257, val));
    displayDraftOrder(teams);
});

// Initial display
// Already called after data fetch
// displayPlayers(filteredPlayers);

</script>
</body>
</html>
