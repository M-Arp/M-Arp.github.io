<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NFL Mock Draft Builder</title>
<style>
body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: space-around;
    margin: 15px;
}
.column {
    border: 1px solid #ccc;
    border-radius: 6px;
    background-color: #f9f9f9;
    padding: 15px;
}
.column:nth-child(1) {
    width: 25%;
}
.column:nth-child(2),
.column:nth-child(3) {
    width: 37.5%;
}
h2 {
    text-align: center;
}
.prospect,
.drafted {
    padding: 5px;
    margin: 5px 0;
    background-color: #e0e0e0;
    border: 1px solid #ddd;
    border-radius: 4px;
    transition: background-color 0.3s;
}
.prospect:hover {
    background-color: #d4d4d4;
}
.draft-result {
    margin-bottom: 10px;
    border: 1px solid #aaa;
    padding: 5px;
    border-radius: 4px;
    display: flex;
    align-items: center;
}
.draft-pick {
    font-size: 1em;
    font-weight: bold;
    color: #333;
    margin-right: 10px;
}
.team-needs {
    font-size: 0.8em;
    color: #555;
    margin-top: 2px;
    padding: 0;
}
.team {
    display: flex;
    align-items: flex-start;
    margin-bottom: 10px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    background-color: #f9f9f9;
}
.draft-order-container {
    display: flex;
    align-items: center;
    margin-right: 10px;
}
.draft-order {
    font-size: 1em;
    font-weight: bold;
    margin-right: 5px;
}
.team-logo {
    width: 25px;
    height: auto;
}
.team-info {
    display: flex;
    flex-direction: column;
}
.team-name {
    font-size: 1em;
    color: #444;
    margin-right: 5px;
}
.edit-button {
    margin: 0;
}
.team-detail {
    display: flex;
    align-items: center;
}
</style>
</head>

<body>
<div class="column">
<h2>Player Pool</h2>
<div class="filter-buttons">
<button class="filter-button" onclick="toggleFilter('QB')">QB</button>
<button class="filter-button" onclick="toggleFilter('RB')">RB</button>
<button class="filter-button" onclick="toggleFilter('TE')">TE</button>
<button class="filter-button" onclick="toggleFilter('OT')">OT</button>
<button class="filter-button" onclick="toggleFilter('IOL')">IOL</button>
<button class="filter-button" onclick="toggleFilter('WR')">WR</button>
<button class="filter-button" onclick="toggleFilter('CB')">CB</button>
<button class="filter-button" onclick="toggleFilter('DT')">DT</button>
<button class="filter-button" onclick="toggleFilter('EDGE')">EDGE</button>
<button class="filter-button" onclick="toggleFilter('LB')">LB</button>
<button class="filter-button" onclick="toggleFilter('S')">S</button>
<button class="filter-button" onclick="toggleFilter('ST')">ST</button>
<button class="filter-button" onclick="resetFilter()">All</button>
</div>
<div id="players"></div>
</div>

<div class="column">
<h2>Draft Order</h2>
<label for="numRounds">Number of Draft Picks:</label>
<input type="number" id="numRounds" min="1" max="257" value="32" />
<button id="updateRounds">Update</button>
<div id="draftOrder"></div>
</div>

<div class="column">
<h2>Draft Results</h2>
<button id="undoPick" style="display: none;">Undo Last Pick</button>
<div id="draftResults"></div>
</div>

<script>
// URLs for data
const playersUrl = `https://docs.google.com/spreadsheets/d/1r5-UN66a-DGc9RWyvAdTu-4FIfDP11-9CXLFgftiuXA/gviz/tq?tqx=out:json`;
const teamsUrl = `https://docs.google.com/spreadsheets/d/1PjanMWKX99obCsdfLzDDsk2-CvqHzerHaJzlRnxigj0/gviz/tq?tqx=out:json`;

let players = [];
let teams = [];
let currentDraftPick = 0;
let numRounds = 32;
let currentPlayerOffset = 0;
const playersPerPage = 50;
let filteredPlayers = [];
let activeFilters = new Set();
let draftHistory = [];

// Fetch players data
fetch(playersUrl)
  .then(response => response.text())
  .then(data => {
    const jsonData = JSON.parse(data.substr(47).slice(0, -2));
    players = jsonData.table.rows.map(row => ({
      name: row.c[5]?.v,
      position: row.c[6]?.v,
      school: row.c[8]?.v,
      ranking: row.c[0]?.v
    }));
    filteredPlayers = [...players];
    sortPlayersByRanking();
    displayPlayers(filteredPlayers);
  });

// Fetch teams data
fetch(teamsUrl)
  .then(response => response.text())
  .then(data => {
    const jsonData = JSON.parse(data.substr(47).slice(0, -2));
    teams = jsonData.table.rows.map(row => ({
      name: row.c[2]?.v,
      logo: row.c[3]?.v,
      draftOrder: row.c[1]?.v,
      needs: row.c[5]?.v
    }));
    displayDraftOrder(teams);
  });

// Display function with pagination
function displayPlayers(players) {
    const container = document.getElementById('players');
    container.innerHTML = '';

    const start = currentPlayerOffset * playersPerPage;
    const end = Math.min(start + playersPerPage, players.length);

    for (let i = start; i < end; i++) {
        const p = players[i];
        const div = document.createElement('div');
        div.className = 'prospect';

        const prospectContent = document.createElement('div');
        prospectContent.className = 'prospect-content';

        const playerRanking = document.createElement('div');
        playerRanking.className = 'player-ranking';
        playerRanking.textContent = p.ranking;

        const playerDetails = document.createElement('div');
        playerDetails.className = 'player-details';

        const playerName = document.createElement('span');
        playerName.className = 'player-name';
        playerName.textContent = p.name;
        playerName.onclick = () => assignPlayerToDraft(p);

        const playerMeta = document.createElement('span');
        playerMeta.className = 'player-meta';
        playerMeta.textContent = `${p.position} | ${p.school}`;

        playerDetails.appendChild(playerName);
        playerDetails.appendChild(playerMeta);

        prospectContent.appendChild(playerRanking);
        prospectContent.appendChild(playerDetails);
        div.appendChild(prospectContent);
        container.appendChild(div);
    }
}

// Display draft order
function displayDraftOrder(teams) {
    const container = document.getElementById('draftOrder');
    container.innerHTML = '';

    const maxRounds = Math.min(numRounds, teams.length);
    for (let i=0; i<maxRounds; i++) {
        const team = teams[i];
        const div = document.createElement('div');
        div.className = 'team';
        div.innerHTML = `
            <div class="draft-order-container">
                <span class="draft-order">${team.draftOrder}</span>
                <img src="${team.logo}" class="team-logo"/>
            </div>
            <div class="team-info">
                <div class="team-detail">
                    <span class="team-name">${team.name}</span>
                    <button class="edit-button">Edit</button>
                </div>
                <div class="team-needs">Needs: ${team.needs}</div>
            </div>
        `;
        container.appendChild(div);
    }
    highlightNextTeam();
}

function highlightNextTeam() {
    const divs = document.querySelectorAll('.team');
    divs.forEach((d,i) => {
        d.style.fontWeight = (i===currentDraftPick) ? 'bold' : 'normal';
    });
}

// Toggle filter
function toggleFilter(pos) {
    if (activeFilters.has(pos)) {
        activeFilters.delete(pos);
    } else {
        activeFilters.add(pos);
    }
    currentPlayerOffset = 0;
    applyFilters();
}

// Apply filters
function applyFilters() {
    if (activeFilters.size > 0) {
        filteredPlayers = players.filter(p => activeFilters.has(p.position));
    } else {
        filteredPlayers = [...players];
    }
    displayPlayers(filteredPlayers);
}

// Reset filter
function resetFilter() {
    activeFilters.clear();
    currentPlayerOffset = 0;
    filteredPlayers = [...players];
    displayPlayers(filteredPlayers);
}

// Assign player
function assignPlayerToDraft(player) {
    if (currentDraftPick < teams.length) {
        const team = teams[currentDraftPick];
        const entry = document.createElement('div');
        entry.className='draft-result';
        entry.innerHTML= `
            <span class="draft-pick">${team.draftOrder}</span>
            <div>
                <span class="team-name">${team.name}</span><br>
                <span>${player.name} | <span class="player-position">${player.position} (#${player.ranking})</span></span>
            </div>
        `;
        document.getElementById('draftResults').insertAdjacentElement('afterbegin', entry);

        // Save for undo
        draftHistory.push({ player: {...player}, team });

        // Remove from pool
        players = players.filter(p => p.name !== player.name);
        filteredPlayers = filteredPlayers.filter(p => p.name !== player.name);
        displayPlayers(filteredPlayers);

        // Remove team from draft order
        teams.splice(currentDraftPick,1);
        // Adjust current pick if needed
        if (currentDraftPick >= teams.length) currentDraftPick=0;
        highlightNextTeam();

        document.getElementById('undoPick').style.display='inline-block';
    }
}

function undoLastPick() {
    if (draftHistory.length > 0) {
        const last = draftHistory.pop();
        const { player, team } = last;

        // Remove last draft entry
        const container = document.getElementById('draftResults');
        if (container.firstChild) container.removeChild(container.firstChild);

        // Add player back to top
        players.unshift(player);
        filteredPlayers = [...players];
        sortPlayersByRanking();
        currentPlayerOffset=0;
        displayPlayers(filteredPlayers);

        // Add team back to start
        teams.unshift(team);
        displayDraftOrder(teams);

        if (draftHistory.length===0) {
            document.getElementById('undoPick').style.display='none';
        }
    }
}

// Sorting
function sortPlayersByRanking() {
    players.sort((a,b) => parseInt(a.ranking) - parseInt(b.ranking));
}

// Event listeners
document.getElementById('undoPick').onclick=undoLastPick;
document.getElementById('updateRounds').onclick=()=> {
    numRounds= Math.max(1, Math.min(257, Number(document.getElementById('numRounds').value)));
    displayDraftOrder(teams);
}

// Initial display
// Already called after fetch
</script>
</body>
</html>
